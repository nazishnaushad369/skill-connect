services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: skillconnect-backend
    env: python
    region: singapore
    plan: free
    rootDir: .
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn backend.config.wsgi:application --chdir backend --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "skillconnect-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: skillconnect-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://skillconnect-app.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: skillconnect-db
    plan: free
    region: singapore
